name = "winsener-meisterschaften"
main = "worker/index.ts"
compatibility_date = "2026-06-29"
compatibility_flags = ["nodejs_compat"]

# Keine zweite, ungeschützte URL auf denselben Worker: Cloudflare Access hängt am
# Custom-Domain-Hostnamen. Sowohl die *.workers.dev-URL als auch die Per-Version-Preview-URLs
# (<version>-<worker>.<subdomain>.workers.dev) wären weitere Hostnamen außerhalb von Access — und
# da der Worker keine eigene Auth mehr hat (edge-only, ADR-0008), je eine offene Admin-API.
# Beide abschalten lässt Access die einzige Eingangstür sein.
workers_dev = false
preview_urls = false

# Account „TV Winsen / Luhe" — hier liegen Zone + D1. Die account_id steht nicht
# im Repo: lokal/CI per Env CLOUDFLARE_ACCOUNT_ID (GitHub: Repo-Variable).

# Custom Domain: wrangler legt beim Deploy den (proxied) DNS-Record und das
# TLS-Zertifikat automatisch an. Zone muss auf demselben Account liegen (tut sie).
[[routes]]
pattern = "meisterschaften.tennisverein-winsen.de"
custom_domain = true

# Statische Astro-Seite (dist/) wird als Assets ausgeliefert; der Worker-Code
# (worker/index.ts) läuft nur für Requests, die KEINER statischen Datei entsprechen
# (also /api/*, /admin). Same-origin → kein CORS nötig.
[assets]
directory = "./dist"
binding = "ASSETS"

[vars]
# Kill-Switch für die öffentliche Teilnehmerliste. "true" = sichtbar, alles andere = aus.
PUBLIC_LIST_ENABLED = "true"

# Telegram-Benachrichtigung bei neuen Anmeldungen (kostenlos, keine DNS-Änderung).
# Sowohl Bot-Token als auch Chat-ID sind Secrets (nicht hier ablegen):
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put TELEGRAM_CHAT_ID

# D1-Datenbank für die Anmeldungen. database_id nach `wrangler d1 create` bzw.
# aus dem Cloudflare-Dashboard eintragen (wird per MCP angelegt).
# Schema-Migrationen liegen in worker/migrations/ (von drizzle-kit generiert) und werden
# mit `wrangler d1 migrations apply winsener-meisterschaften` eingespielt — der frühere
# manuelle worker/schema.sql-Workflow ist abgelöst (ADR-0009).
[[d1_databases]]
binding = "DB"
database_name = "winsener-meisterschaften"
database_id = "93cf5f66-b7d2-4adb-802c-31c63cb3f23c"
migrations_dir = "worker/migrations"

# Wöchentlicher LK-Sync aus nuLiga: Montag 10:00 UTC (12:00 CEST). Bewusst nicht
# früher: nuLiga veröffentlicht die wöchentliche LK-Neuberechnung erst im Laufe des
# Montagvormittags — ein 05:00-UTC-Lauf fand nur die Vorwochen-Werte (0 Änderungen).
[triggers]
crons = ["0 10 * * 1"]

[observability]
enabled = true
head_sampling_rate = 1

# Operator-Flächen (/admin, /api/admin/*) sind in Produktion ausschließlich durch Cloudflare
# Zero Trust Access am Edge geschützt (E-Mail-OTP, Team-Portal tv-winsen.cloudflareaccess.com).
# Der Worker hat keine eigene Auth mehr (edge-only, ADR-0008) — es gibt kein ADMIN_TOKEN.
