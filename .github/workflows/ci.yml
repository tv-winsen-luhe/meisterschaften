name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Ein Lauf pro Ref; neuere Pushes überholen ältere (PR-Checks wie Main-Deploy).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  # Branch protection ist auf dem privaten Free-Repo nicht verfügbar; deshalb
  # bindet `needs: checks` den Deploy an die grüne Suite — ein kaputter main
  # wird nie deployt, egal wie der Merge zustande kam. (Siehe ADR-0012.)
  deploy:
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Apply D1 migrations before deploying the code that depends on them: the new worker must
      # never run against an un-migrated DB (a renamed/removed value would read back wrong). Both
      # `migrations apply` and `deploy` are idempotent, so re-running a no-op deploy is safe.
      - name: Apply D1 migrations
        run: pnpm exec wrangler d1 migrations apply winsener-meisterschaften --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
