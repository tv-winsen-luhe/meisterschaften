name: Commitlint

# We squash-merge with the PR title as the commit subject (repo setting
# `squash_merge_commit_title = PR_TITLE`), so the PR title — not the individual
# PR commits — is what lands on `main`. Lint that. `synchronize` is included so
# the check re-runs on every head SHA; a required check must exist on the SHA
# being merged. (See ADR-0013.)
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The PR title is attacker-controlled on a public repo; pass it via env,
      # never interpolate `${{ … }}` into the shell line (script injection).
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s' "$PR_TITLE" | pnpm exec commitlint --verbose
