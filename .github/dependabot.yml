version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    groups:
      prod-minor-patch:
        applies-to: version-updates
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-minor-patch:
        applies-to: version-updates
        dependency-type: development
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: '06:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
      include: scope
